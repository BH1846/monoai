# Dev overrides: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d`
# Postgres is prepared here for Phase 2 (core/vault/storage/postgres_store.py,
# gateway/auth's PostgresKeyStore) — not required or started by Phase 1's
# default `make up`, which only needs Valkey.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: monoai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: monoai
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles: ["full"]

volumes:
  postgres-data:
