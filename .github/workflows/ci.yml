name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: install
        run: uv sync --all-packages
      - name: lint
        run: uv run ruff check core gateway tests
      - name: typecheck
        run: uv run mypy core gateway
      - name: unit + integration tests
        run: uv run pytest tests/unit tests/integration tests/adversarial -v
        env:
          VALKEY_PASSWORD: ci-test-password-not-a-real-secret
          SESSION_TOKEN_SECRET: ci-test-secret-not-a-real-secret
