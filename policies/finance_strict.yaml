policy_id: finance_strict
description: "Stricter policy for finance/regulated teams — no confidence-floor downgrades, network+identity data blocked outright"

detectors:
  packs: ["base_en"]
  min_global_confidence: 0.0

rules:
  EMAIL:        { action: REVERSIBLE }
  PHONE:        { action: REVERSIBLE }
  IP_ADDRESS:   { action: BLOCK }
  DATE_TIME:    { action: REVERSIBLE }
  USERNAME:     { action: REVERSIBLE }
  PERSON:       { action: REVERSIBLE }
  ADDRESS:      { action: REVERSIBLE }
  CREDIT_CARD:  { action: BLOCK }
  GOV_ID:       { action: BLOCK }
  SECRET:       { action: BLOCK }
  ORG:          { action: PRESERVE }
  TITLE:        { action: PRESERVE }
  DEMOGRAPHIC:  { action: BLOCK }
  MISC:         { action: PRESERVE }

overrides:
  locked_span_negation:
    when_meta_negated: false
    action: PRESERVE

token_budget_mode: false
compressible_length_threshold: 20

output_scan:
  enabled: true
  reuse_input_rules: true
