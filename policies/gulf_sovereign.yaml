policy_id: gulf_sovereign
description: >-
  UAE/Gulf-region sovereign policy: activates the gulf_ar pack (Emirates
  ID, Iqama, Saudi National ID, Qatar QID, Bahrain CPR, Kuwait Civil ID,
  Oman civil number regex+checksum engines) alongside base_en, with an
  Arabic locale hint. See DECISIONS.md and
  core/detect/packs/gulf_ar/ids.py for which of those checksums are
  confirmed-official vs. best-effort vs. structural-pattern-only.
locale_hint: ar

detectors:
  packs: ["base_en", "gulf_ar"]
  min_global_confidence: 0.0

rules:
  EMAIL:        { action: REVERSIBLE }
  PHONE:        { action: REVERSIBLE }
  IP_ADDRESS:   { action: REVERSIBLE }
  DATE_TIME:    { action: REVERSIBLE }
  USERNAME:     { action: REVERSIBLE }
  PERSON:
    action: REVERSIBLE
    min_confidence: 0.6
    below_min_confidence_action: PRESERVE
  ADDRESS:
    action: REVERSIBLE
    min_confidence: 0.6
    below_min_confidence_action: PRESERVE
  CREDIT_CARD:  { action: BLOCK }
  GOV_ID:
    action: BLOCK
    min_confidence: 0.6
    below_min_confidence_action: PRESERVE
  SECRET:       { action: BLOCK }
  ORG:          { action: PRESERVE }
  TITLE:        { action: PRESERVE }
  DEMOGRAPHIC:  { action: PRESERVE }
  MISC:         { action: PRESERVE }

overrides:
  locked_span_negation:
    when_meta_negated: true
    action: PRESERVE

token_budget_mode: false
compressible_length_threshold: 20

output_scan:
  enabled: true
  reuse_input_rules: true
