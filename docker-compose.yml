services:
  valkey:
    image: valkey/valkey:latest
    ports:
      - "6380:6379"
    # No default fallback value on purpose: a missing .env must fail loudly
    # rather than silently run with a guessable password (closes G14).
    command: ["--requirepass", "${VALKEY_PASSWORD:?VALKEY_PASSWORD must be set in .env}"]
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkey-data:/data

volumes:
  valkey-data:
